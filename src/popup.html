<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Yandex Archiver Downloader</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="container">
      <h1>Yandex Archiver</h1>
      <p class="subtitle">Скачать документ из Яндекс.Архив</p>

      <label class="field">
        <span>Формат</span>
        <select id="format">
          <option value="zip">ZIP (изображения)</option>
          <option value="pdf">PDF (единый файл)</option>
        </select>
      </label>

      <div class="actions">
        <button id="start" class="primary">Начать</button>
        <button id="stop">Остановить</button>
      </div>

      <div id="progress" class="progress">Ожидание запуска</div>
    </main>
    <script src="./popup.js"></script>
  </body>
</html>
